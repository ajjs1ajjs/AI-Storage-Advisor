linters:
  enable-all: false
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell

linters-settings:
  govet:
    check-shadowing: true
  misspell:
    locale: US

run:
  timeout: 5m
  skip-dirs:
    - frontend/dist
  skip-files:
    - ".*_test\\.go"

issues:
  exclude-rules:
    - path: ".*_test\\.go"
      linters:
        - unused
        - staticcheck
    - path: ".*autogen.*\\.go"
      linters:
        - all
      text: "nolint"
